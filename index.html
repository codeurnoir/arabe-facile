<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>200 Mots Arabes Essentiels</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0806;
    --surface: #13100d;
    --card: #1c1710;
    --gold: #c9933a;
    --gold-light: #e8b86d;
    --gold-pale: #f5deb3;
    --red: #8b2020;
    --green: #2d6a4f;
    --blue: #1a3a5c;
    --purple: #4a2060;
    --teal: #1a5c5c;
    --orange: #8b4a00;
    --text: #f0e8d8;
    --text-dim: #a89070;
    --border: rgba(201,147,58,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    border-bottom: 1px solid var(--border);
    background: radial-gradient(ellipse at 50% 0%, rgba(201,147,58,0.08) 0%, transparent 70%);
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .arabic-title {
    font-family: 'Amiri', serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(201,147,58,0.3);
    direction: rtl;
  }

  .french-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold);
    display: block;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Search & Filter */
  .controls {
    padding: 30px 20px;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: var(--text-dim); }

  .mode-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .mode-btn:hover, .mode-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,147,58,0.05);
  }

  /* Category Tabs */
  .tabs {
    padding: 0 20px 20px;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab:hover { color: var(--text); border-color: rgba(201,147,58,0.4); }

  .tab.active {
    color: var(--bg);
    border-color: transparent;
    font-weight: 500;
  }

  /* Words Grid */
  .words-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* Word Card */
  .word-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .word-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 12px 0 0 12px;
  }

  .word-card:hover {
    border-color: rgba(201,147,58,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  .word-card.expanded {
    border-color: var(--gold);
    background: #201a10;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .arabic-word {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: var(--gold-light);
    direction: rtl;
    line-height: 1.2;
  }

  .word-num {
    font-size: 0.7rem;
    color: var(--text-dim);
    background: rgba(255,255,255,0.05);
    padding: 3px 8px;
    border-radius: 100px;
    flex-shrink: 0;
  }

  .transliteration {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 4px;
  }

  .translation {
    font-size: 1rem;
    color: var(--text);
    font-weight: 500;
  }

  /* Expanded content */
  .card-detail {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .word-card.expanded .card-detail { display: block; }

  .detail-section {
    margin-bottom: 14px;
  }

  .detail-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .example-ar {
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    color: var(--gold-pale);
    direction: rtl;
    text-align: right;
    line-height: 1.8;
    margin-bottom: 4px;
  }

  .example-fr {
    font-size: 0.88rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .mnemonic {
    background: rgba(201,147,58,0.07);
    border: 1px solid rgba(201,147,58,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.87rem;
    color: var(--gold-pale);
    line-height: 1.5;
  }

  .mnemonic-icon {
    font-size: 1rem;
    margin-right: 6px;
  }

  /* Category colors */
  [data-cat="salutations"] .word-card::before { background: var(--green); }
  [data-cat="salutations"] .tab.active { background: var(--green); }

  [data-cat="nourriture"] .word-card::before { background: var(--orange); }
  [data-cat="nourriture"] .tab.active { background: var(--orange); }

  [data-cat="directions"] .word-card::before { background: var(--blue); }
  [data-cat="directions"] .tab.active { background: var(--blue); }

  [data-cat="chiffres"] .word-card::before { background: var(--purple); }
  [data-cat="chiffres"] .tab.active { background: var(--purple); }

  [data-cat="famille"] .word-card::before { background: var(--red); }
  [data-cat="famille"] .tab.active { background: var(--red); }

  [data-cat="temps"] .word-card::before { background: var(--teal); }
  [data-cat="temps"] .tab.active { background: var(--teal); }

  [data-cat="corps"] .word-card::before { background: #5a3a6a; }
  [data-cat="corps"] .tab.active { background: #5a3a6a; }

  [data-cat="verbes"] .word-card::before { background: #2a4a2a; }
  [data-cat="verbes"] .tab.active { background: #2a4a2a; }

  [data-cat="emotions"] .word-card::before { background: #6a2a2a; }
  [data-cat="emotions"] .tab.active { background: #6a2a2a; }

  [data-cat="quotidien"] .word-card::before { background: #4a4a1a; }
  [data-cat="quotidien"] .tab.active { background: #4a4a1a; }

  [data-cat="nature"] .word-card::before { background: #1a4a3a; }
  [data-cat="nature"] .tab.active { background: #1a4a3a; }

  .tab.active[data-cat="all"] { background: var(--gold); color: var(--bg); }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(201,147,58,0.15);
    z-index: 100;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.3s;
  }

  /* Count badge */
  .count-badge {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 0.8rem;
    color: var(--text-dim);
    z-index: 100;
  }

  .count-badge span { color: var(--gold); font-weight: 500; }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 1.1rem;
  }

  /* Category emoji */
  .cat-emoji { font-size: 1rem; }
</style>
</head>
<body>

<header>
  <div class="arabic-title">الكلمات الأساسية</div>
  <div class="french-title">200 Mots Arabes Essentiels — Arabe Littéraire</div>
  <div class="stats">
    <div class="stat"><span class="stat-num">200</span><span class="stat-label">Mots</span></div>
    <div class="stat"><span class="stat-num">11</span><span class="stat-label">Catégories</span></div>
    <div class="stat"><span class="stat-num">200</span><span class="stat-label">Exemples</span></div>

<div class="tabs" id="tabsContainer"></div>

  { id:199, cat:'quotidien', ar:'مَفْهُوم', tr:'mafhūm', fr:'Compris / Concept', ex_ar:'مَفْهُوم! سَأَفْعَلُ ذَلِكَ', ex_fr:'Compris ! Je le ferai', mnemonic:'🧠 "Mafhūm" = compris/concept. "Fahm" = compréhension. MAF-HŪM = "MA FLEMME HUM ?" Non : j\'ai compris !' },
  { id:200, cat:'quotidien', ar:'بِالتَّوْفِيق', tr:'bi-t-tawfīq', fr:'Bonne chance', ex_ar:'بِالتَّوْفِيقِ فِي دِرَاسَتِكَ', ex_fr:'Bonne chance dans tes études', mnemonic:'🧠 "Tawfīq" = succès/réussite (don de Dieu). BI-TAWFĪQ = AVEC LA RÉUSSITE. Prénom aussi !' },
];

// State
let currentCat = 'all';
let searchQuery = '';
let mnemoOnly = false;

// Build tabs
const tabsContainer = document.getElementById('tabsContainer');
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (cat.id === 'all' ? ' active' : '');
  btn.dataset.cat = cat.id;
  btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span>${cat.label}`;
  btn.onclick = () => {
    currentCat = cat.id;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  tabsContainer.appendChild(btn);
});

function toggleMnemoOnly() {
  mnemoOnly = !mnemoOnly;
  document.getElementById('toggleMnemo').classList.toggle('active', mnemoOnly);
  render();
}

function getFiltered() {
  return words.filter(w => {
    if (currentCat !== 'all' && w.cat !== currentCat) return false;
    if (mnemoOnly && !w.mnemonic) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return w.fr.toLowerCase().includes(q) || w.ar.includes(searchQuery) || w.tr.toLowerCase().includes(q);
    }
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const container = document.getElementById('wordsContainer');
  const countEl = document.getElementById('countDisplay');
  const progress = document.getElementById('progressFill');

  countEl.textContent = filtered.length;
  progress.style.width = (filtered.length / words.length * 100) + '%';

  // Set category color on container
  container.dataset.cat = currentCat === 'all' ? '' : currentCat;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">Aucun mot trouvé 🔍</div>';
    return;
  }

  container.innerHTML = '';
  filtered.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.dataset.cat = w.cat;
    card.style.animationDelay = (i % 20 * 30) + 'ms';

    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="arabic-word">${w.ar}</div>
          <div class="transliteration">${w.tr}</div>
          <div class="translation">${w.fr}</div>
        </div>
        <span class="word-num">#${w.id}</span>
      </div>
      <div class="card-detail">
        <div class="detail-section">
          <div class="detail-label">📖 Exemple</div>
          <div class="example-ar">${w.ex_ar}</div>
          <div class="example-fr">${w.ex_fr}</div>
        </div>
        ${w.mnemonic ? `
        <div class="detail-section">
          <div class="detail-label">💡 Mnémotechnique</div>
          <div class="mnemonic">${w.mnemonic}</div>
        </div>` : ''}
      </div>
    `;

    card.onclick = () => {
      card.classList.toggle('expanded');
    };

    container.appendChild(card);
  });
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

render();
</script>
